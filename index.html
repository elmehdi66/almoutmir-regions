        <style>
            :root {
                --text-color: #6dbcaa;
                --cursor-color: #D7492B;
                /* Width needs to be enough to hold the text + letter spacing */
                --reveal-width: 340px;
            }

            .typewriter-container {
                display: inline-block;
                vertical-align: middle;
            }

            .typewriter-text {
                font-family: 'Fira Code', monospace;
                font-weight: 800;
                font-size: 1.4vw;
                text-transform: uppercase;
                letter-spacing: 0.3em;
                white-space: nowrap;
                overflow: hidden;
                width: 0;
                color: var(--text-color);
                display: block;

                /* Gradient shimmer effect */
                background: linear-gradient(to right, #01564D, #569c95, #01564D);
                background-size: 200% auto;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;

                /* Combined Animations */
                animation:
                    type 2s steps(12, end) forwards,
                    shimmer-reveal 2.5s linear infinite;
            }

            /* Target specific items if you want different delay/timing */
            .typewriter-text.field {
                animation-delay: 2s, 0s;
                /* Delays the typing of the second one slightly */
            }


            @keyframes type {
                from {
                    width: 0;
                    border-right: 3px solid var(--cursor-color);
                }

                to {
                    width: var(--reveal-width);
                    border-right: 3px solid transparent;
                    /* Cursor disappears at the end */
                }
            }

            @keyframes shimmer-reveal {
                0% {
                    background-position: 0% center;
                }

                100% {
                    background-position: 200% center;
                }
            }

            /* Optional: Add a separate blink if you want the cursor to stay */
            .typewriter-text {
                border-right: 3px solid transparent;
            }
        </style>

    <!-- ========================= -->
    <!-- THREE JS BACKGROUND -->
    <!-- ========================= -->
    <script>
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            80,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // LIGHTS
        const light1 = new THREE.SpotLight(0xffffff, 10000);
        light1.position.set(20, 40, 40);
        scene.add(light1);

        const light2 = new THREE.PointLight(0x00ffff, 5000);
        light2.position.set(-20, -20, -20);
        scene.add(light2);

        // SPHERE
        const radius = 26;
        const geometry = new THREE.SphereGeometry(radius, 128, 128);

        const uniforms = { uTime: { value: 0 } };

        const material = new THREE.MeshPhysicalMaterial({
            transmission: 1,
            roughness: 0.08,
            transparent: true,
            opacity: 0,
            side: THREE.DoubleSide
        });

        material.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = uniforms.uTime;

            shader.vertexShader = `
        uniform float uTime;
        ${shader.vertexShader}
    `.replace(
                '#include <begin_vertex>',
                `
        float disp = sin(normal.x * 6.0 + uTime) * cos(normal.y * 6.0 + uTime) * 1.5;
        vec3 transformed = position + (normal * disp);
        `
            );
        };

        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // 1. Create a Circular Texture Programmatically
        const createCircleTexture = () => {
            const size = 128; // Increased resolution for smoother edges
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const context = canvas.getContext('2d');

            // Drawing a slightly smaller circle (size * 0.45 instead of 0.5) 
            // to prevent edge clipping/half-circles
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.45;

            context.beginPath();
            context.arc(centerX, centerY, radius, 0, Math.PI * 2);
            context.fillStyle = '#ffffff';
            context.fill();

            const texture = new THREE.CanvasTexture(canvas);

            // Ensure the texture is centered and doesn't repeat
            texture.needsUpdate = true;
            return texture;
        };
        // 2. PARTICLES setup
        const count = 5000;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const base = new Float32Array(count * 3);

        // Offset from the sphere (radius is 26)
        const minDistance = radius - 1;
        const maxDistance = radius + 4;

        for (let i = 0; i < count; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);

            // Slight spread for a volumetric digital look
            const dist = minDistance + (Math.random() * (maxDistance - minDistance));

            const x = dist * Math.sin(phi) * Math.cos(theta);
            const y = dist * Math.sin(phi) * Math.sin(theta);
            const z = dist * Math.cos(phi);

            base[i * 3] = x;
            base[i * 3 + 1] = y;
            base[i * 3 + 2] = z;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // 3. Apply the Material (Removed map and alphaTest)
        const mat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.4,      // Squares look "sharper," so a smaller size often looks classier
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            opacity: 0.4,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(geo, mat);
        scene.add(particles);

        camera.position.z = 60;

        // DISPLACEMENT
        const getDisp = (nx, ny, nz, t) =>
            Math.sin(nx * 6 + t) * Math.cos(ny * 6 + t) * 1.5;

        // ANIMATE
        function animate(time) {
            const t = time * 0.001;
            uniforms.uTime.value = t;

            sphere.rotation.y = t * 0.15;
            particles.rotation.y = t * 0.15;

            const arr = geo.attributes.position.array;

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;

                const bx = base[i3];
                const by = base[i3 + 1];
                const bz = base[i3 + 2];

                const mag = Math.sqrt(bx * bx + by * by + bz * bz);

                const nx = bx / mag;
                const ny = by / mag;
                const nz = bz / mag;

                const d = getDisp(nx, ny, nz, t);

                arr[i3] = bx + nx * d;
                arr[i3 + 1] = by + ny * d;
                arr[i3 + 2] = bz + nz * d;
            }

            geo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate(0);

        // RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <title>Regions | Al Moutmir Platform Design</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(./Background.png);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            background-color: #051a14;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 1;
            z-index: -5;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background-image: url(./agri.png), radial-gradient(rgba(0, 0, 0, 0.167), #002a282b 50%);
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .circle-container {
            width: 50vw;
            height: 85vh;
            position: relative;
            cursor: grab;
            touch-action: none;
            /* FIX MOBILE */
        }

        .circle-container:active {
            cursor: grabbing;
        }

        .circle {
            width: 85vh;
            height: 85vh;
            position: absolute;
            border-radius: 50%;
            transform: translateX(-50%) rotate(var(--rotation, 0deg));
            transition: transform .7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85vh;
            height: 85vh;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-sizing: border-box;
        }

        .center-image {
            position: absolute;
            top: 50%;
            left: 25%;
            height: 40vh !important;
            transform: translate(-50%, -50%);
            border-radius: 20px;
            object-fit: cover;
            z-index: 2;
            transition: filter .4s ease-in-out, opacity .4s ease;
            pointer-events: none;
        }

        .center-image.changing {
            filter: blur(3px);
            opacity: 1;
        }

        .item {
            position: absolute;
            top: 50%;
            left: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 0;
            height: 0;
        }

        .item-inner {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 2px solid #00584E;
            transition: width .5s ease, height .5s ease, border .5s ease;
            cursor: pointer;
            z-index: 10;
            flex-shrink: 0;
        }

        .item-inner.active {
            width: 40px;
            height: 40px;
            border: 12px solid #00584E;
        }

        .image-group {
            position: absolute;
            left: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: none;
            transform-origin: center;
        }

        .item-image {
            width: 250px;
            opacity: .6;
            transition: .5s;
            pointer-events: auto;
            cursor: pointer;
        }

        .read-more-btn {
            background: #00584E;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: .4s;
            pointer-events: none;
        }

        .item-inner.active+.image-group .item-image {
            width: 420px;
            opacity: 1;
        }

        .item-inner.active+.image-group .read-more-btn {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: auto;
        }

        .logo {
            width: 80px;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }
    </style>

</head>

<body>
    <a title="Home page" href="index.html">
        <img src="./assets/img/logo/logo-bg-square.png"
            style="position: absolute;top: 60px;left: 6%;transform: translateX(-50%);z-index: 5;width: 60px;" alt="">

    </a>
    <canvas id="three-canvas"></canvas>

    <img src="./logo-light.png" class="logo">

    <div class="overlay"></div>

    <div style="height:100vh;width:100vw;display:flex;justify-content:start;align-items:center;">
        <div class="circle-container" id="container">
            <img id="centerImage" class="center-image" src="./1.png">
            <div class="circle" id="circle"></div>
        </div>
    </div>
<script>
    /** -----------------------------
     *  DATA MODEL (SINGLE SOURCE OF TRUTH)
     * ----------------------------- */
    const slides = Array.from({ length: 12 }, (_, i) => ({
        center: `./${i + 1}.png`,
        region: `./${i + 1}-region.png`,
        // link: `./regions/region-${i + 1}.html`
          link: `./regions/berrechid.html`
    }));

    const total = slides.length;
    const radius = window.innerHeight * 0.425;

    const circle = document.getElementById("circle");
    const container = document.getElementById("container");
    const centerImage = document.getElementById("centerImage");

    /** -----------------------------
     *  STATE
     * ----------------------------- */
    let currentRotation = 0;
    let isDragging = false;
    let startY = 0;
    let startRotation = 0;

    /** -----------------------------
     *  DOM STORAGE
     * ----------------------------- */
    const inners = [];
    const groups = [];

    /** -----------------------------
     *  BUILD CIRCLE ITEMS
     * ----------------------------- */
    for (let i = 0; i < total; i++) {

        const angle = (360 / total) * i;

        const item = document.createElement("div");
        item.className = "item";

        const inner = document.createElement("div");
        inner.className = "item-inner";

        const imageGroup = document.createElement("div");
        imageGroup.className = "image-group";

        const sideImage = document.createElement("img");
        sideImage.className = "item-image";
        sideImage.src = slides[i].region;

        const btn = document.createElement("button");
        btn.className = "read-more-btn";
        btn.innerText = "READ MORE";

        btn.onclick = (e) => {
            e.stopPropagation();
            window.location.href = slides[i].link;
        };

        imageGroup.append(sideImage, btn);

        inners.push(inner);
        groups.push(imageGroup);

        inner.onclick = () => rotateTo(i);
        sideImage.onclick = () => rotateTo(i);

        item.append(inner, imageGroup);
        circle.appendChild(item);
    }

    /** -----------------------------
     *  ROTATION ENGINE
     * ----------------------------- */
    function applyRotation(withTransition = true) {
        circle.style.transition = withTransition
            ? "transform .7s cubic-bezier(0.4,0,0.2,1)"
            : "none";

        circle.style.setProperty('--rotation', currentRotation + 'deg');

        updateUpright();
    }

    function updateUpright() {
        inners.forEach((el, index) => {

            const baseAngle = (360 / total) * index;
            const counter = -baseAngle - currentRotation;

            el.parentElement.style.transform =
                `rotate(${baseAngle}deg) translate(${radius}px)`;

            el.style.transform = `rotate(${counter}deg)`;
            groups[index].style.transform = `rotate(${counter}deg)`;
        });
    }

    /** -----------------------------
     *  ROTATE TO INDEX
     * ----------------------------- */
    function rotateTo(index) {

        const step = 360 / total;

        let diff = (step * index + currentRotation) % 360;

        if (diff > 180) diff -= 360;
        if (diff < -180) diff += 360;

        currentRotation -= diff;

        applyRotation(true);
        updateActiveUI();
    }

    /** -----------------------------
     *  ACTIVE UI + CENTER IMAGE SYNC
     * ----------------------------- */
    function updateActiveUI() {

        const step = 360 / total;

        let active = Math.round(
            ((-currentRotation % 360 + 360) % 360) / step
        ) % total;

        inners.forEach((el, i) => {

            if (i === active) {

                if (!el.classList.contains("active")) {

                    el.classList.add("active");

                    centerImage.classList.add("changing");

                    setTimeout(() => {
                        centerImage.src = slides[i].center;
                        centerImage.classList.remove("changing");
                    }, 300);
                }

            } else {
                el.classList.remove("active");
            }
        });
    }

    /** -----------------------------
     *  DRAG (MOUSE + TOUCH)
     * ----------------------------- */
    const getY = e => e.touches ? e.touches[0].clientY : e.clientY;

    let moved = false;
    const threshold = 5;

    const startDrag = e => {
        isDragging = true;
        moved = false;
        startY = getY(e);
        startRotation = currentRotation;
    };

    const onDrag = e => {
        if (!isDragging) return;

        const delta = getY(e) - startY;

        if (Math.abs(delta) > threshold) {
            moved = true;
            e.preventDefault();
        }

        currentRotation = startRotation + delta * 0.25;

        applyRotation(false);
        updateActiveUI();
    };

    const endDrag = () => {
        if (!isDragging) return;

        isDragging = false;

        if (!moved) return;

        const step = 360 / total;

        currentRotation =
            Math.round(currentRotation / step) * step;

        applyRotation(true);
    };

    /** -----------------------------
     *  EVENTS
     * ----------------------------- */
    container.addEventListener("mousedown", startDrag);
    window.addEventListener("mousemove", onDrag);
    window.addEventListener("mouseup", endDrag);

    container.addEventListener("touchstart", startDrag, { passive: true });
    window.addEventListener("touchmove", onDrag, { passive: false });
    window.addEventListener("touchend", endDrag);

    /** -----------------------------
     *  INIT
     * ----------------------------- */
    rotateTo(0);
</script>

</body>

</html>
